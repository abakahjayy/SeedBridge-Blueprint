kind = "web"
previewPath = "/"
title = "SeedBridge"
version = "1.0.0"
id = "artifacts/seedbridge"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20033

[services.development]
run = "pnpm --filter @workspace/seedbridge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/seedbridge", "run", "build" ]
serve = "static"
publicDir = "artifacts/seedbridge/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20033"
BASE_PATH = "/"
